<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanad — Community Exchange Grid</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #dfd5c6; 
            background-image: 
                linear-gradient(rgba(130, 90, 50, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(130, 90, 50, 0.04) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .hero-font { font-family: 'Space Grotesk', sans-serif; }
        .cyber-header {
            background: rgba(240, 232, 218, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(150, 110, 80, 0.2);
        }
        .leaflet-container {
            font-family: 'Plus Jakarta Sans', sans-serif;
            border-radius: 24px;
        }
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee { animation: marquee 35s linear infinite; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-stone-900 antialiased min-h-screen flex flex-col p-4 md:p-6 gap-6">

    <header class="w-full max-w-7xl mx-auto h-20 cyber-header rounded-3xl px-6 flex items-center justify-between sticky top-4 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-transparent rounded-xl flex items-center justify-center overflow-hidden shrink-0">
                <img src="/static/Logo.png" alt="Sanad Logo" class="object-contain h-full w-full" onerror="this.src='https://placehold.co/100x100?text=SANAD'">
            </div>
            <div class="flex flex-col">
                <span class="text-base font-black tracking-widest text-stone-950 leading-none">SANAD</span>
                <span class="text-[11px] text-[#a06a42] font-bold tracking-widest uppercase mt-0.5">سند</span>
            </div>
        </div>

        <div class="hidden md:flex items-center gap-2.5 text-[10px] font-black text-stone-700 tracking-widest uppercase bg-stone-900/5 px-4 py-2 rounded-xl border border-stone-900/5">
            <i id="gps-icon" class="fa-solid fa-location-crosshairs text-amber-700 animate-pulse"></i>
            <span>GRID TELEMETRY: <span id="user-coords" class="text-stone-950">24.4880° N, 54.3614° E</span></span>
        </div>

        <div>
            <button onclick="toggleModal(true)" class="bg-[#ac7347] hover:bg-[#945f37] text-white text-xs font-extrabold px-6 py-3 rounded-xl transition-all duration-200 transform active:scale-95 cursor-pointer tracking-wider shadow-sm">
                BROADCAST NODE
            </button>
        </div>
    </header>

    <section class="w-full max-w-7xl mx-auto pt-2 flex flex-col gap-1">
        <h1 class="hero-font text-4xl md:text-5xl font-black text-stone-950 tracking-tighter uppercase select-none">
            COMMUNITY <span class="bg-gradient-to-r from-[#8a5329] to-[#ac7347] bg-clip-text text-transparent">SUPPORT HUB GRID</span>
        </h1>
    </section>

    <section class="w-screen -mx-4 md:-mx-6 bg-[#d4c8b6] border-y border-stone-400/40 py-2.5 overflow-hidden flex select-none">
        <div class="flex whitespace-nowrap gap-12 text-[10px] font-black tracking-widest uppercase items-center animate-marquee shrink-0 text-stone-800">
            <span>ECOSYSTEM NODES ONLINE</span> <span class="text-[#ac7347]">•</span>
            <span>INTEGRATED FROM MOBILE CONSOLE MATRIX PLUGINS</span> <span class="text-[#ac7347]">•</span>
            <span>REAL-TIME SPATIAL POSITIONING VERIFIED</span> <span class="text-[#ac7347]">•</span>
        </div>
    </section>

    <main class="w-full max-w-7xl mx-auto flex flex-col gap-4 flex-1">
        
        <div class="w-full flex flex-col xl:flex-row xl:items-center justify-between gap-4 border-b border-stone-400/30 pb-3">
            <div class="flex items-center gap-2 overflow-x-auto whitespace-nowrap scrollbar-none py-1">
                <button id="tab-all" onclick="filterCategory('all')" class="px-4 py-2 rounded-xl text-xs font-extrabold bg-[#ac7347] text-white transition-all cursor-pointer flex items-center gap-2">
                    <i class="fa-solid fa-layer-group"></i> ALL FEATURES
                </button>
                <button id="tab-projects" onclick="filterCategory('projects')" class="px-4 py-2 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer flex items-center gap-2">
                    <i class="fa-solid fa-folder-open"></i> COMMUNITY PROJECTS
                </button>
                <button id="tab-volunteer" onclick="filterCategory('volunteer')" class="px-4 py-2 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer flex items-center gap-2">
                    <i class="fa-solid fa-hands-holding-child"></i> VOLUNTEER MATCHING
                </button>
                <button id="tab-skills" onclick="filterCategory('skills')" class="px-4 py-2 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer flex items-center gap-2">
                    <i class="fa-solid fa-lightbulb"></i> SKILLS HUB
                </button>
                <button id="tab-news" onclick="filterCategory('news')" class="px-4 py-2 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer flex items-center gap-2">
                    <i class="fa-solid fa-newspaper"></i> NEIGHBOURHOOD NEWS
                </button>
            </div>

            <div class="flex items-center bg-[#d4c8b6]/60 p-1 rounded-xl border border-stone-400/30 self-start xl:self-auto">
                <button id="type-all" onclick="filterType('all')" class="px-3 py-1.5 bg-[#c8bca8] text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">ALL NODES</button>
                <button id="type-service" onclick="filterType('Service')" class="px-3 py-1.5 text-stone-700 hover:text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">SERVICES</button>
                <button id="type-product" onclick="filterType('Product')" class="px-3 py-1.5 text-stone-700 hover:text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">PRODUCTS</button>
            </div>
        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <div class="lg:col-span-7 w-full min-h-[400px]">
                <div id="listings-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    </div>
            </div>

            <div class="lg:col-span-5 lg:sticky lg:top-28 w-full">
                <div class="bg-[#ebdcc7]/40 border border-stone-400/30 p-3 rounded-3xl">
                    <div class="flex items-center gap-2 text-[10px] font-black tracking-wider text-stone-800 uppercase mb-2">
                        <i class="fa-solid fa-map-location-dot text-[#ac7347]"></i>
                        <span>RADIAL GRID POSITION COORDINATION GRAPH</span>
                    </div>
                    <div id="main-map" class="w-full aspect-square rounded-2xl border border-stone-400/40 shadow-sm z-10"></div>
                </div>
            </div>

        </div>
    </main>

    <div id="form-modal" class="fixed inset-0 bg-stone-950/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-200">
        <div class="bg-[#ebdcc7] border border-stone-400/40 rounded-3xl shadow-xl w-full max-w-md p-5 transform scale-95 transition-all duration-200 text-stone-900 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between border-b border-stone-400/40 pb-3 mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-3.5 bg-[#ac7347] rounded-sm"></div>
                    <h3 class="font-extrabold text-xs text-stone-950 uppercase tracking-widest">Broadcast Asset Node</h3>
                </div>
                <button onclick="toggleModal(false)" class="text-stone-600 hover:text-stone-950 cursor-pointer p-1">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Household / Anchor Entity Group</label>
                    <input type="text" id="form-provider" placeholder="e.g. Al Suwaidi Family" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none text-stone-950">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Ecosystem Channel</label>
                        <select id="form-category" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none">
                            <option value="projects">Community Projects</option>
                            <option value="volunteer">Volunteer Matching</option>
                            <option value="skills">Skills Hub</option>
                            <option value="news">Neighbourhood News</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Node Type</label>
                        <select id="form-type" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none">
                            <option value="Service">Service</option>
                            <option value="Product">Product</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Broadcast Title</label>
                    <input type="text" id="form-title" placeholder="e.g. Traditional Majlis Coordination Support" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none text-stone-950">
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Context Description</label>
                    <textarea id="form-description" rows="2" placeholder="Specify project requirements, updates, or timelines explicitly..." class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none text-stone-950 resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Tap Mini-Compass graph to Set Radial Node</label>
                    <div id="modal-map" class="w-full h-24 rounded-xl border border-stone-400/50 shadow-sm"></div>
                    <input type="hidden" id="form-lat" value="24.4539">
                    <input type="hidden" id="form-lng" value="54.3773">
                </div>

                <div class="flex items-center justify-between gap-3 border border-stone-400/40 p-2 rounded-xl bg-[#f6ede0]">
                    <div>
                        <label class="block text-[9px] font-black text-stone-500 tracking-widest uppercase mb-0.5">Value / Metrics Metric</label>
                        <input type="text" id="form-price" placeholder="e.g. 5 Open Slots / AED 100" class="w-full bg-transparent text-xs text-stone-950 font-black focus:outline-none">
                    </div>
                    <div class="flex items-center gap-1.5 border-l border-stone-400/40 pl-3 h-8 shrink-0">
                        <input type="checkbox" id="form-student" class="w-3.5 h-3.5 accent-[#ac7347] rounded bg-white">
                        <label for="form-student" class="text-[9px] font-black text-stone-600 tracking-widest uppercase cursor-pointer">Student?</label>
                    </div>
                </div>

                <button onclick="submitNewListing()" class="w-full bg-[#ac7347] hover:bg-[#945f37] text-white text-xs font-black uppercase tracking-widest py-3 rounded-xl transition-all cursor-pointer shadow-sm">
                    BROADCAST TO SYSTEM MATRIX
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentCategory = 'all';
        let currentType = 'all';
        let userLat = 24.4880;
        let userLng = 54.3614;

        let mainMap, modalMap;
        let mainMarkersGroup = L.layerGroup();
        let userLocationMarker = null;
        let modalSelectionMarker = null;

        // SAFE ASSET SEQUENCER HOOK
        window.addEventListener('load', () => {
            initMaps();
            fetchAndRenderListings();
        });

        function initMaps() {
            try {
                mainMap = L.map('main-map', { scrollWheelZoom: false }).setView([userLat, userLng], 11);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CARTO'
                }).addTo(mainMap);
                mainMarkersGroup.addTo(mainMap);

                userLocationMarker = L.circleMarker([userLat, userLng], {
                    radius: 8, fillColor: '#3b82f6', color: '#fff', weight: 2, fillOpacity: 0.9
                }).addTo(mainMap).bindPopup('<b>YOUR HOST RADIAL COMPASS STATION</b>');

                modalMap = L.map('modal-map', { zoomControl: false }).setView([userLat, userLng], 10);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(modalMap);

                modalMap.on('click', (e) => {
                    document.getElementById('form-lat').value = e.latlng.lat;
                    document.getElementById('form-lng').value = e.latlng.lng;
                    if (modalSelectionMarker) {
                        modalSelectionMarker.setLatLng(e.latlng);
                    } else {
                        modalSelectionMarker = L.marker(e.latlng).addTo(modalMap);
                    }
                });
            } catch(err) {
                console.warn("Map setup finalized securely.", err);
            }
        }

        function toggleModal(open) {
            const modal = document.getElementById('form-modal');
            const inner = modal.querySelector('div');
            if(open) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                inner.classList.remove('scale-95');
                setTimeout(() => { if(modalMap) modalMap.invalidateSize(); }, 200);
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                inner.classList.add('scale-95');
            }
        }

        function panToMapTarget(lat, lng) {
            if(mainMap && lat && lng) {
                mainMap.setView([lat, lng], 14, { animate: true, duration: 1.0 });
                mainMarkersGroup.eachLayer((marker) => {
                    if(marker.getLatLng().lat === parseFloat(lat) && marker.getLatLng().lng === parseFloat(lng)) {
                        marker.openPopup();
                    }
                });
            }
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.className = 'px-4 py-2 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer flex items-center gap-2';
            });
            const targeted = document.getElementById(`tab-${cat}`);
            if(targeted) targeted.className = 'px-4 py-2 rounded-xl text-xs font-extrabold bg-[#ac7347] text-white transition-all cursor-pointer flex items-center gap-2';
            fetchAndRenderListings();
        }

        function filterType(type) {
            currentType = type;
            document.querySelectorAll('[id^="type-"]').forEach(el => {
                el.className = 'px-3 py-1.5 text-stone-700 hover:text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer';
            });
            const idMap = type === 'all' ? 'all' : type === 'Service' ? 'service' : 'product';
            const node = document.getElementById(`type-${idMap}`);
            if(node) node.className = 'px-3 py-1.5 bg-[#c8bca8] text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer';
            fetchAndRenderListings();
        }

        function calculateKilometerGap(lat1, lon1, lat2, lon2) {
            if (!lat2 || !lon2) return null;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(1);
        }

        function fetchAndRenderListings() {
            const container = document.getElementById('listings-grid');
            if(!container) return;
            container.innerHTML = '';
            if(mainMarkersGroup) mainMarkersGroup.clearLayers(); 

            fetch(`/api/listings?category=${currentCategory}&type=${currentType}`)
                .then(res => res.json())
                .then(data => {
                    renderDatasetNodes(data && data.length > 0 ? data : getFeaturesFallbackArray());
                })
                .catch(() => {
                    renderDatasetNodes(getFeaturesFallbackArray());
                });
        }

        // DYNAMIC CONTEXT ICON MAPPER MATCHING THE BRAND DESIGNED MOCKUPS
        function getFeatureConfigLayout(category) {
            switch(category) {
                case 'projects':
                    return { icon: 'fa-folder-open', color: 'text-amber-800 bg-amber-500/10', label: 'COMMUNITY PROJECT' };
                case 'volunteer':
                    return { icon: 'fa-hands-holding-child', color: 'text-emerald-800 bg-emerald-500/10', label: 'VOLUNTEER MATCH' };
                case 'skills':
                    return { icon: 'fa-lightbulb', color: 'text-indigo-800 bg-indigo-500/10', label: 'SKILLS HUB' };
                case 'news':
                    return { icon: 'fa-newspaper', color: 'text-rose-800 bg-rose-500/10', label: 'NEIGHBOURHOOD ALERT' };
                default:
                    return { icon: 'fa-dot-circle', color: 'text-stone-800 bg-stone-500/10', label: 'SANAD NODE' };
            }
        }

        function getFeaturesFallbackArray() {
            return [
                {
                    "provider": "Zayed Heritage Group",
                    "category": "projects",
                    "type": "Product",
                    "title": "Al Bateen Community Garden Initiative",
                    "description": "Collaborative urban planting project constructing traditional green spaces. Seeking material drop-offs and architectural shade setup layouts.",
                    "price": "Target: 500kg Soil",
                    "location_zone": "24.4562,54.3484"
                },
                {
                    "provider": "Emirati Youth Red Crescent",
                    "category": "volunteer",
                    "type": "Service",
                    "title": "Senior Companion Care & Story Archiving",
                    "description": "Volunteers needed to visit elders, coordinate weekly social majlis discussions, and document oral local histories.",
                    "price": "4 Slots Open",
                    "location_zone": "24.4820,54.3580"
                }
            ];
        }

        function renderDatasetNodes(dataset) {
            const container = document.getElementById('listings-grid');
            if(!container) return;
            container.innerHTML = '';

            // Guard layer filter for fallback safety
            const activeData = dataset.filter(item => {
                if (currentCategory !== 'all' && item.category !== currentCategory) return False;
                if (currentType !== 'all' && item.type !== currentType) return False;
                return true;
            });

            if (activeData.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 flex flex-col items-center justify-center border border-dashed border-stone-400/40 rounded-2xl bg-[#ebdcc7]/10">
                        <i class="fa-solid fa-folder-open text-stone-400 text-2xl mb-2"></i>
                        <span class="text-xs font-bold text-stone-500 uppercase tracking-widest">No active broadcast channels found</span>
                    </div>`;
                return;
            }

            activeData.forEach((item) => {
                const initials = item.provider ? item.provider.substring(0, 2).toUpperCase() : 'SD';
                let targetLat = 24.4539;
                let targetLon = 54.3773;
                
                if(item.location_zone && item.location_zone.includes(',')) {
                    const splitted = item.location_zone.split(',');
                    targetLat = parseFloat(splitted[0]);
                    targetLon = parseFloat(splitted[1]);
                }

                if (mainMarkersGroup) {
                    try {
                        const mapMarker = L.marker([targetLat, targetLon])
                            .bindPopup(`
                                <div style="font-family:'Plus Jakarta Sans', sans-serif; padding: 2px;">
                                    <b style="color:#ac7347; text-transform:uppercase; font-size:11px;">${item.title}</b><br>
                                    <span style="font-size:10px; color:#222; display:block; margin-top:2px;">Origin: ${item.provider}</span>
                                    <span style="font-size:10px; color:#ac7347; font-weight:bold;">Metrics: ${item.price}</span>
                                </div>
                            `);
                        mainMarkersGroup.addLayer(mapMarker);
                    } catch(e) {}
                }

                const cfg = getFeatureConfigLayout(item.category);
                const computedDistance = calculateKilometerGap(userLat, userLng, targetLat, targetLon);
                const distanceText = computedDistance ? `${computedDistance} km away` : 'Active Hub';

                const cardHtml = `
                    <div onclick="panToMapTarget(${targetLat}, ${targetLon})" class="bg-gradient-to-br from-[#f5ede0] to-[#ebdcc7] border border-stone-400/30 rounded-2xl p-5 flex flex-col justify-between transition-all duration-150 hover:-translate-y-0.5 hover:shadow-md text-stone-900 cursor-pointer group">
                        <div class="mb-4">
                            <div class="flex justify-between items-center gap-2 mb-2">
                                <div class="flex items-center gap-1.5 px-2 py-0.5 rounded ${cfg.color} border border-stone-400/10">
                                    <i class="fa-solid ${cfg.icon} text-[10px]"></i>
                                    <span class="text-[8px] font-black uppercase tracking-widest">${cfg.label}</span>
                                </div>
                                <span class="text-[10px] text-[#ac7347] font-extrabold tracking-tight flex items-center gap-1">
                                    <i class="fa-solid fa-map-pin text-emerald-700"></i> ${distanceText}
                                </span>
                            </div>
                            <h3 class="hero-font text-base font-black tracking-tight uppercase text-stone-950 line-clamp-2 mt-1">${item.title}</h3>
                            <p class="text-[11px] text-stone-700 leading-normal mt-1.5 font-medium">${item.description}</p>
                        </div>
                        
                        <div class="border-t border-stone-400/20 pt-3 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <div class="w-7 h-7 rounded-lg bg-[#ac7347]/10 text-[#ac7347] font-black text-[10px] flex items-center justify-center uppercase">${initials}</div>
                                <span class="text-xs font-bold text-stone-950">${item.provider}</span>
                            </div>
                            <span class="text-xs font-black text-stone-950 bg-[#ac7347]/10 text-[#ac7347] px-2 py-1 rounded-md max-w-[140px] truncate">${item.price}</span>
                        </div>
                    </div>`;
                
                container.innerHTML += cardHtml;
            });
        }

        function submitNewListing() {
            const provider = document.getElementById('form-provider').value;
            const category = document.getElementById('form-category').value;
            const type = document.getElementById('form-type').value;
            const title = document.getElementById('form-title').value;
            const description = document.getElementById('form-description').value;
            const price = document.getElementById('form-price').value;
            const chosenLat = document.getElementById('form-lat').value;
            const chosenLng = document.getElementById('form-lng').value;
            const isStudent = document.getElementById('form-student').checked;

            if(!provider || !title || !description) {
                alert('Fill out all fields to complete node generation.');
                return;
            }

            fetch('/api/listings/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    provider, category, type, title, description, price, 
                    location_zone: `${chosenLat},${chosenLng}`,
                    is_student: isStudent ? 'true' : 'false' 
                })
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    document.getElementById('form-title').value = '';
                    document.getElementById('form-description').value = '';
                    document.getElementById('form-price').value = '';
                    if(modalSelectionMarker) { modalMap.removeLayer(modalSelectionMarker); modalSelectionMarker = null; }
                    toggleModal(false);
                    fetchAndRenderListings();
                }
            });
        }
    </script>
</body>
</html>
