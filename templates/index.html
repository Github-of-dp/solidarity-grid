<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanad — Community Exchange Grid</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #dfd5c6; 
            background-image: 
                linear-gradient(rgba(130, 90, 50, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(130, 90, 50, 0.04) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .hero-font { font-family: 'Space Grotesk', sans-serif; }
        .cyber-header {
            background: rgba(240, 232, 218, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(150, 110, 80, 0.2);
        }
        .leaflet-container {
            font-family: 'Plus Jakarta Sans', sans-serif;
            border-radius: 24px;
        }
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee { animation: marquee 35s linear infinite; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-stone-900 antialiased min-h-screen flex flex-col p-4 md:p-6 gap-6">

    <header class="w-full max-w-7xl mx-auto h-20 cyber-header rounded-3xl px-6 flex items-center justify-between sticky top-4 z-50 shadow-xs">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-transparent rounded-xl flex items-center justify-center overflow-hidden shrink-0">
                <img src="/static/Logo.png" alt="Sanad Logo" class="object-contain h-full w-full" onerror="this.src='https://placehold.co/100x100?text=SANAD'">
            </div>
            <div class="flex flex-col">
                <span class="text-base font-black tracking-widest text-stone-950 leading-none">SANAD</span>
                <span class="text-[11px] text-[#a06a42] font-bold tracking-widest uppercase mt-0.5">سند</span>
            </div>
        </div>

        <div class="hidden md:flex items-center gap-2.5 text-[10px] font-black text-stone-700 tracking-widest uppercase bg-stone-900/5 px-4 py-2 rounded-xl border border-stone-900/5">
            <i id="gps-icon" class="fa-solid fa-location-crosshairs text-amber-700 animate-pulse"></i>
            <span>POSITION STATUS: <span id="user-coords" class="text-stone-950">24.4880° N, 54.3614° E</span></span>
        </div>

        <div>
            <button onclick="toggleModal(true)" class="bg-[#ac7347] hover:bg-[#945f37] text-white text-xs font-extrabold px-6 py-3 rounded-xl transition-all duration-200 transform active:scale-95 cursor-pointer tracking-wider shadow-sm">
                BROADCAST ASSET
            </button>
        </div>
    </header>

    <section class="w-full max-w-7xl mx-auto pt-2 pb-1 flex flex-col gap-1">
        <h1 class="hero-font text-4xl md:text-5xl font-black text-stone-950 tracking-tighter uppercase select-none">
            COMMUNITY <span class="bg-gradient-to-r from-[#8a5329] to-[#ac7347] bg-clip-text text-transparent">SUPPORT MAP GRID</span>
        </h1>
    </section>

    <section class="w-screen -mx-4 md:-mx-6 bg-[#d4c8b6] border-y border-stone-400/40 py-2.5 overflow-hidden flex select-none">
        <div class="flex whitespace-nowrap gap-12 text-[10px] font-black tracking-widest uppercase items-center animate-marquee shrink-0 text-stone-800">
            <span>SANAD SYSTEM ONLINE</span> <span class="text-[#ac7347]">•</span>
            <span>PERSISTENT STORAGE MATRIX CONNECTED</span> <span class="text-[#ac7347]">•</span>
            <span>CLICK CARDS TO TRACK GEO-SPATIAL LOCATIONS INSTANTLY</span> <span class="text-[#ac7347]">•</span>
        </div>
    </section>

    <main class="w-full max-w-7xl mx-auto flex flex-col gap-4 flex-1">
        
        <div class="w-full flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-stone-400/30 pb-3">
            <div class="flex items-center gap-2 overflow-x-auto whitespace-nowrap scrollbar-none">
                <button id="tab-all" onclick="filterCategory('all')" class="px-4 py-2 rounded-xl text-xs font-extrabold bg-[#ac7347] text-white transition-all cursor-pointer">ALL NODES</button>
                <button id="tab-services" onclick="filterCategory('services')" class="px-4 py-2 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer">FAMILY SERVICES</button>
                <button id="tab-heritage" onclick="filterCategory('heritage')" class="px-4 py-2 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer">HERITAGE & CRAFTS</button>
            </div>

            <div class="flex items-center bg-[#d4c8b6]/60 p-1 rounded-xl border border-stone-400/30">
                <button id="type-all" onclick="filterType('all')" class="px-3 py-1.5 bg-[#c8bca8] text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">ALL</button>
                <button id="type-service" onclick="filterType('Service')" class="px-3 py-1.5 text-stone-700 hover:text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">OFFERS</button>
                <button id="type-product" onclick="filterType('Product')" class="px-3 py-1.5 text-stone-700 hover:text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">PRODUCTS</button>
            </div>
        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <div class="lg:col-span-7 h-auto block min-h-[400px]">
                <div id="listings-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    </div>
            </div>

            <div class="lg:col-span-5 lg:sticky lg:top-28">
                <div class="bg-[#ebdcc7]/40 border border-stone-400/30 p-3 rounded-3xl">
                    <div class="flex items-center gap-2 text-[10px] font-black tracking-wider text-stone-800 uppercase mb-2">
                        <i class="fa-solid fa-map-location-dot text-[#ac7347]"></i>
                        <span>RADIAL TARGET COMPASS (SQUARE VIEW)</span>
                    </div>
                    <div id="main-map" class="w-full aspect-square rounded-2xl border border-stone-400/40 shadow-xs z-10"></div>
                </div>
            </div>

        </div>
    </main>

    <div id="form-modal" class="fixed inset-0 bg-stone-950/40 backdrop-blur-xs z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-200">
        <div class="bg-[#ebdcc7] border border-stone-400/40 rounded-3xl shadow-xl w-full max-w-md p-5 transform scale-95 transition-all duration-200 text-stone-900 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between border-b border-stone-400/40 pb-3 mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-3.5 bg-[#ac7347] rounded-xs"></div>
                    <h3 class="font-extrabold text-xs text-stone-950 uppercase tracking-widest">Register Exchange Node</h3>
                </div>
                <button onclick="toggleModal(false)" class="text-stone-600 hover:text-stone-950 cursor-pointer p-1">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Household / Identity Name</label>
                    <input type="text" id="form-provider" placeholder="e.g. Al Suwaidi Family" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none text-stone-950">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Category</label>
                        <select id="form-category" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none">
                            <option value="services">Family Services</option>
                            <option value="heritage">Heritage & Crafts</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Type</label>
                        <select id="form-type" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none">
                            <option value="Service">Service</option>
                            <option value="Product">Product</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Listing Title</label>
                    <input type="text" id="form-title" placeholder="e.g. Traditional Majlis Support" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none text-stone-950">
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Listing Description</label>
                    <textarea id="form-description" rows="2" placeholder="Provide listing details..." class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none text-stone-950 resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Tap Mini Map to Set Location</label>
                    <div id="modal-map" class="w-full h-24 rounded-xl border border-stone-400/50 shadow-xs"></div>
                    <input type="hidden" id="form-lat" value="24.4539">
                    <input type="hidden" id="form-lng" value="54.3773">
                </div>

                <div class="flex items-center justify-between gap-3 border border-stone-400/40 p-2 rounded-xl bg-[#f6ede0]">
                    <div>
                        <label class="block text-[9px] font-black text-stone-500 tracking-widest uppercase mb-0.5">Value Metric</label>
                        <input type="text" id="form-price" placeholder="AED 150" class="w-full bg-transparent text-xs text-stone-950 font-black focus:outline-none">
                    </div>
                    <div class="flex items-center gap-1.5 border-l border-stone-400/40 pl-3 h-8 shrink-0">
                        <input type="checkbox" id="form-student" class="w-3.5 h-3.5 accent-[#ac7347] rounded bg-white">
                        <label for="form-student" class="text-[9px] font-black text-stone-600 tracking-widest uppercase cursor-pointer">Student?</label>
                    </div>
                </div>

                <button onclick="submitNewListing()" class="w-full bg-[#ac7347] hover:bg-[#945f37] text-white text-xs font-black uppercase tracking-widest py-3 rounded-xl transition-all cursor-pointer shadow-xs">
                    BROADCAST LIVE
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentCategory = 'all';
        let currentType = 'all';
        let userLat = 24.4880;
        let userLng = 54.3614;

        let mainMap, modalMap;
        let mainMarkersGroup = L.layerGroup();
        let userLocationMarker = null;
        let modalSelectionMarker = null;

        window.addEventListener('DOMContentLoaded', () => {
            initMaps();
            fetchAndRenderListings();
        });

        function initMaps() {
            mainMap = L.map('main-map', { scrollWheelZoom: false }).setView([userLat, userLng], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO'
            }).addTo(mainMap);
            mainMarkersGroup.addTo(mainMap);

            userLocationMarker = L.circleMarker([userLat, userLng], {
                radius: 8, fillColor: '#3b82f6', color: '#fff', weight: 2, fillOpacity: 0.9
            }).addTo(mainMap).bindPopup('<b>YOUR DETECTED STATION</b>');

            modalMap = L.map('modal-map', { zoomControl: false }).setView([userLat, userLng], 10);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(modalMap);

            modalMap.on('click', (e) => {
                document.getElementById('form-lat').value = e.latlng.lat;
                document.getElementById('form-lng').value = e.latlng.lng;
                if (modalSelectionMarker) {
                    modalSelectionMarker.setLatLng(e.latlng);
                } else {
                    modalSelectionMarker = L.marker(e.latlng).addTo(modalMap);
                }
            });
        }

        function toggleModal(open) {
            const modal = document.getElementById('form-modal');
            const inner = modal.querySelector('div');
            if(open) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                inner.classList.remove('scale-95');
                setTimeout(() => { modalMap.invalidateSize(); }, 200);
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                inner.classList.add('scale-95');
            }
        }

        function panToMapTarget(lat, lng) {
            if(mainMap && lat && lng) {
                mainMap.setView([lat, lng], 14, { animate: true, duration: 1.0 });
                mainMarkersGroup.eachLayer((marker) => {
                    if(marker.getLatLng().lat === parseFloat(lat) && marker.getLatLng().lng === parseFloat(lng)) {
                        marker.openPopup();
                    }
                });
            }
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.className = 'px-4 py-2 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer';
            });
            const targeted = document.getElementById(`tab-${cat}`);
            if(targeted) targeted.className = 'px-4 py-2 rounded-xl text-xs font-extrabold bg-[#ac7347] text-white transition-all cursor-pointer';
            fetchAndRenderListings();
        }

        function filterType(type) {
            currentType = type;
            document.querySelectorAll('[id^="type-"]').forEach(el => {
                el.className = 'px-3 py-1.5 text-stone-700 hover:text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer';
            });
            const idMap = type === 'all' ? 'all' : type === 'Service' ? 'service' : 'product';
            const node = document.getElementById(`type-${idMap}`);
            if(node) node.className = 'px-3 py-1.5 bg-[#c8bca8] text-stone-950 text-[9px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer';
            fetchAndRenderListings();
        }

        function calculateKilometerGap(lat1, lon1, lat2, lon2) {
            if (!lat2 || !lon2) return null;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(1);
        }

        function fetchAndRenderListings() {
            fetch(`/api/listings?category=${currentCategory}&type=${currentType}`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('listings-grid');
                    container.innerHTML = '';
                    mainMarkersGroup.clearLayers(); 

                    // HARDWARE FALLBACK INJECTOR: Built-in local arrays protect view if endpoint database is empty
                    const activeDataset = (data && data.length > 0) ? data : [
                        {
                            "provider": "Rahul Sharma",
                            "category": "services",
                            "type": "Service",
                            "title": "Class 12 Math & Calculus Tuition",
                            "description": "Offering tailored preparation tracks for CBSE Grade 12 Mathematics, focusing on Calculus integration techniques and Matrix determinants.",
                            "price": "AED 120/hr",
                            "location_zone": "24.4322,54.6044"
                        },
                        {
                            "provider": "Aisha Al Mansoori",
                            "category": "heritage",
                            "type": "Product",
                            "title": "Handcrafted Clay Pottery & Talli Crafts",
                            "description": "Authentic, locally sourced Emirati heritage crafts and hand-woven items perfect for traditional community presentation setups.",
                            "price": "AED 250",
                            "location_zone": "24.4680,54.3644"
                        }
                    ];

                    activeDataset.forEach((item) => {
                        const initials = item.provider ? item.provider.substring(0, 2).toUpperCase() : 'SD';
                        let targetLat = 24.4539;
                        let targetLon = 54.3773;
                        
                        if(item.location_zone && item.location_zone.includes(',')) {
                            const splitted = item.location_zone.split(',');
                            targetLat = parseFloat(splitted[0]);
                            targetLon = parseFloat(splitted[1]);
                        }

                        const mapMarker = L.marker([targetLat, targetLon])
                            .bindPopup(`
                                <div style="font-family:'Plus Jakarta Sans', sans-serif; padding: 2px;">
                                    <b style="color:#ac7347; text-transform:uppercase; font-size:11px;">${item.title}</b><br>
                                    <span style="font-size:10px; color:#222; display:block; margin-top:2px;">Handler: ${item.provider}</span>
                                    <span style="font-size:10px; color:#666; display:block;">Rate: ${item.price}</span>
                                </div>
                            `);
                        mainMarkersGroup.addLayer(mapMarker);

                        const computedDistance = calculateKilometerGap(userLat, userLng, targetLat, targetLon);
                        const distanceText = computedDistance ? `${computedDistance} km away` : 'Active Node';

                        const cardHtml = `
                            <div onclick="panToMapTarget(${targetLat}, ${targetLon})" class="bg-gradient-to-br from-[#f5ede0] to-[#ebdcc7] border border-stone-400/30 rounded-2xl p-5 flex flex-col justify-between transition-all duration-150 hover:-translate-y-0.5 hover:shadow-md text-stone-900 cursor-pointer group">
                                <div class="mb-4">
                                    <div class="flex justify-between items-center gap-2 mb-2">
                                        <span class="text-[8px] font-black uppercase tracking-widest bg-stone-950/5 text-stone-700 px-2 py-0.5 rounded border border-stone-400/20">${item.type}</span>
                                        <span class="text-[10px] text-[#ac7347] font-extrabold tracking-tight flex items-center gap-1">
                                            <i class="fa-solid fa-map-pin text-emerald-700"></i> ${distanceText}
                                        </span>
                                    </div>
                                    <h3 class="hero-font text-base font-black tracking-tight uppercase text-stone-950 line-clamp-2">${item.title}</h3>
                                    <p class="text-[11px] text-stone-700 leading-normal mt-1.5 font-medium">${item.description}</p>
                                </div>
                                
                                <div class="border-t border-stone-400/20 pt-3 flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <div class="w-7 h-7 rounded-lg bg-[#ac7347]/10 text-[#ac7347] font-black text-[10px] flex items-center justify-center uppercase">${initials}</div>
                                        <span class="text-xs font-bold text-stone-950">${item.provider}</span>
                                    </div>
                                    <span class="text-xs font-black text-stone-950 bg-[#ac7347]/10 text-[#ac7347] px-2 py-1 rounded-md">${item.price}</span>
                                </div>
                            </div>`;
                        
                        container.innerHTML += cardHtml;
                    });
                })
                .catch(err => console.error("Data pipeline mismatch error:", err));
        }

        function submitNewListing() {
            const provider = document.getElementById('form-provider').value;
            const category = document.getElementById('form-category').value;
            const type = document.getElementById('form-type').value;
            const title = document.getElementById('form-title').value;
            const description = document.getElementById('form-description').value;
            const price = document.getElementById('form-price').value;
            const chosenLat = document.getElementById('form-lat').value;
            const chosenLng = document.getElementById('form-lng').value;
            const isStudent = document.getElementById('form-student').checked;

            if(!provider || !title || !description) {
                alert('Fill out all fields to complete registration.');
                return;
            }

            fetch('/api/listings/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    provider, category, type, title, description, price, 
                    location_zone: `${chosenLat},${chosenLng}`,
                    is_student: isStudent ? 'true' : 'false' 
                })
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    document.getElementById('form-title').value = '';
                    document.getElementById('form-description').value = '';
                    document.getElementById('form-price').value = '';
                    if(modalSelectionMarker) { modalMap.removeLayer(modalSelectionMarker); modalSelectionMarker = null; }
                    toggleModal(false);
                    fetchAndRenderListings();
                }
            });
        }
    </script>
</body>
</html>
