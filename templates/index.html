<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Solidarity Grid</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fafafa; 
        }
        .feed-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .feed-card:hover {
            border-color: #2563eb;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }
        /* Smooth Modal transition helper */
        .modal-animate {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="text-slate-900 antialiased min-h-screen flex flex-col">

    <!-- ULTRA-MINIMALIST COMPACT NAVIGATION -->
    <header class="bg-[#0f172a] text-white sticky top-0 z-40 shadow-xs">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <div class="w-2.5 h-5 bg-blue-600 rounded-xs"></div>
                <span class="text-sm font-extrabold tracking-wider uppercase">SOLIDARITY<span class="text-blue-500">GRID</span></span>
            </div>
            
            <!-- Context Action Control Row -->
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-1.5 text-xs text-slate-400 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-800">
                    <i class="fa-solid fa-circle-nodes text-blue-500 text-[10px]"></i>
                    <span>Abu Dhabi Node</span>
                </div>
                <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm transition-all cursor-pointer flex items-center gap-2">
                    <i class="fa-solid fa-plus text-[11px]"></i>
                    <span>Create Listing</span>
                </button>
            </div>
        </div>
    </header>

    <!-- CLEAN CENTRAL APP HUB WORKSPACE -->
    <main class="max-w-6xl w-full mx-auto px-6 py-10 flex-1 flex flex-col gap-8">
        
        <!-- DASHBOARD FILTER SUB-HEADER HUB -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-200 pb-5">
            <!-- Modern Text Filter Row Selector Pills -->
            <div class="flex items-center gap-1 overflow-x-auto whitespace-nowrap scrollbar-none">
                <button id="tab-all" onclick="filterCategory('all')" class="px-4 py-2 text-xs font-bold bg-blue-50 text-blue-600 rounded-lg transition-all cursor-pointer">All Exchanges</button>
                <button id="tab-services" onclick="filterCategory('services')" class="px-4 py-2 text-xs font-semibold text-slate-500 hover:text-slate-900 rounded-lg transition-all cursor-pointer">Family Services</button>
                <button id="tab-heritage" onclick="filterCategory('heritage')" class="px-4 py-2 text-xs font-semibold text-slate-500 hover:text-slate-900 rounded-lg transition-all cursor-pointer">Heritage & Crafts</button>
            </div>

            <!-- Context Filter Segment Switcher -->
            <div class="flex items-center bg-slate-100 p-1 rounded-lg self-start sm:self-auto border border-slate-200">
                <button id="type-all" onclick="filterType('all')" class="px-3 py-1 bg-white text-slate-900 text-[11px] font-bold rounded-md shadow-2xs transition-all cursor-pointer">All</button>
                <button id="type-service" onclick="filterType('Service')" class="px-3 py-1 text-slate-500 hover:text-slate-900 text-[11px] font-semibold transition-all cursor-pointer">Offers</button>
                <button id="type-product" onclick="filterType('Product')" class="px-3 py-1 text-slate-500 hover:text-slate-900 text-[11px] font-semibold transition-all cursor-pointer">Products</button>
            </div>
        </div>

        <!-- HIGH-FIDELITY MASONRY-STYLE CATALOG CARD STREAM -->
        <div id="listings-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for item in listings %}
            <div class="feed-card rounded-2xl p-6 flex flex-col justify-between">
                <div>
                    <!-- Meta Header Tag strip -->
                    <div class="flex justify-between items-center gap-4 mb-3.5">
                        <span class="text-[9px] font-bold uppercase tracking-widest text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">
                            {{ item.type }}
                        </span>
                        <span class="text-[11px] text-slate-400 font-medium flex items-center gap-1">
                            <i class="fa-solid fa-location-dot text-slate-300"></i> {{ item.distance }}
                        </span>
                    </div>
                    <!-- Core Info Block -->
                    <h3 class="font-bold text-slate-900 text-base mb-1.5 tracking-tight line-clamp-1">{{ item.title }}</h3>
                    <p class="text-xs text-slate-500 leading-relaxed mb-6 font-normal line-clamp-2 h-9">{{ item.description }}</p>
                </div>
                
                <!-- Card Footer Border Strip -->
                <div class="border-t border-slate-100 pt-4 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="w-7 h-7 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 font-bold text-[10px] flex items-center justify-center uppercase shrink-0">
                            {{ item.provider[:2] }}
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-slate-800 line-clamp-1 max-w-[100px]">{{ item.provider }}</span>
                            <span class="text-[9px] text-emerald-600 font-bold flex items-center gap-0.5"><i class="fa-solid fa-circle-check text-[8px]"></i> Verified</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2.5">
                        <span class="text-xs font-extrabold text-slate-900">{{ item.price }}</span>
                        <button onclick="alert('Routing clean contact channel loop...')" class="px-3.5 py-1.5 bg-[#0f172a] hover:bg-slate-800 text-white text-[11px] font-bold rounded-lg shadow-2xs transition-all cursor-pointer">
                            Connect
                        </button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- HIDDEN OVERLAY POPUP CREATION MODAL MODULE -->
    <div id="form-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none modal-animate">
        <div class="bg-white border border-slate-200 rounded-2xl shadow-xl w-full max-w-md p-6 relative transform scale-95 modal-animate">
            
            <!-- Modal Exit Control Header -->
            <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-circle-plus text-blue-600 text-sm"></i>
                    <h3 class="font-bold text-sm text-slate-900 uppercase tracking-wider">New Grid Listing</h3>
                </div>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600 cursor-pointer p-1">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <!-- Clean Form Entry Slots -->
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Your Name / Household</label>
                    <input type="text" id="form-provider" placeholder="e.g. Al Mazrouei Household" class="w-full text-xs px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50 font-medium">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Category Stream</label>
                        <select id="form-category" class="w-full text-xs px-2 py-2 bg-white border border-slate-200 rounded-xl text-slate-700 font-medium focus:outline-none focus:border-blue-500">
                            <option value="services">Family Services</option>
                            <option value="heritage">Heritage & Crafts</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Resource Type</label>
                        <select id="form-type" class="w-full text-xs px-2 py-2 bg-white border border-slate-200 rounded-xl text-slate-700 font-medium focus:outline-none focus:border-blue-500">
                            <option value="Service">Service</option>
                            <option value="Product">Product</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Listing Title</label>
                    <input type="text" id="form-title" placeholder="e.g. Traditional Handcrafted Basket" class="w-full text-xs px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50 font-medium">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Context / Details</label>
                    <textarea id="form-description" rows="3" placeholder="Provide clean parameters, metrics, or guidelines..." class="w-full text-xs px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50 font-medium resize-none"></textarea>
                </div>

                <div class="flex items-center justify-between gap-3 border border-slate-200 p-3 rounded-xl bg-slate-50">
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 uppercase mb-0.5">Value / Price</label>
                        <input type="text" id="form-price" placeholder="AED 150" class="w-full bg-transparent text-xs text-slate-900 font-bold focus:outline-none placeholder-slate-400">
                    </div>
                    <div class="flex items-center gap-1.5 border-l border-slate-200 pl-3 h-8 shrink-0">
                        <input type="checkbox" id="form-student" class="w-3.5 h-3.5 accent-blue-600 rounded">
                        <label for="form-student" class="text-[9px] font-bold text-slate-500 tracking-wide uppercase select-none cursor-pointer">Student?</label>
                    </div>
                </div>

                <button onclick="submitNewListing()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold uppercase tracking-wider py-3 rounded-xl transition shadow-xs cursor-pointer text-center mt-2">
                    Publish Listing
                </button>
            </div>
        </div>
    </div>

    <!-- PIPELINE SCRIPT INTERACTIVE DISPATCHER LAYER -->
    <script>
        let currentCategory = 'all';
        let currentType = 'all';

        // Toggle Modal System cleanly
        function toggleModal(open) {
            const modal = document.getElementById('form-modal');
            const inner = modal.querySelector('div');
            if(open) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                inner.classList.remove('scale-95');
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                inner.classList.add('scale-95');
            }
        }

        function filterCategory(cat) {
            currentCategory = cat;
            
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.className = 'px-4 py-2 text-xs font-semibold text-slate-500 hover:text-slate-900 rounded-lg transition-all cursor-pointer';
            });
            const targeted = document.getElementById(`tab-${cat}`);
            if(targeted) {
                targeted.className = 'px-4 py-2 text-xs font-bold bg-blue-50 text-blue-600 rounded-lg transition-all cursor-pointer';
            }
            fetchAndRenderListings();
        }

        function filterType(type) {
            currentType = type;
            
            document.querySelectorAll('[id^="type-"]').forEach(el => {
                el.className = 'px-3 py-1 text-slate-500 hover:text-slate-900 text-[11px] font-semibold transition-all cursor-pointer';
            });
            const idMap = type === 'all' ? 'all' : type === 'Service' ? 'service' : 'product';
            const node = document.getElementById(`type-${idMap}`);
            if(node) {
                node.className = 'px-3 py-1 bg-white text-slate-900 text-[11px] font-bold rounded-md shadow-2xs transition-all cursor-pointer';
            }
            fetchAndRenderListings();
        }

        function fetchAndRenderListings() {
            fetch(`/api/listings?category=${currentCategory}&type=${currentType}`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('listings-grid');
                    container.innerHTML = '';
                    
                    if(data.length === 0) {
                        container.innerHTML = `
                            <div class="col-span-full bg-white border border-dashed border-slate-200 rounded-2xl p-12 text-center text-slate-400 text-xs font-medium">
                                No active node listings found for the selected view filter context.
                            </div>`;
                        return;
                    }

                    data.forEach(item => {
                        const initials = item.provider ? item.provider.substring(0, 2).toUpperCase() : 'HN';
                        container.innerHTML += `
                            <div class="feed-card rounded-2xl p-6 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-center gap-4 mb-3.5">
                                        <span class="text-[9px] font-bold uppercase tracking-widest text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">${item.type}</span>
                                        <span class="text-[11px] text-slate-400 font-medium flex items-center gap-1">
                                            <i class="fa-solid fa-location-dot text-slate-300"></i> ${item.distance}
                                        </span>
                                    </div>
                                    <h3 class="font-bold text-slate-900 text-base mb-1.5 tracking-tight line-clamp-1">${item.title}</h3>
                                    <p class="text-xs text-slate-500 leading-relaxed mb-6 font-normal line-clamp-2 h-9">${item.description}</p>
                                </div>
                                <div class="border-t border-slate-100 pt-4 flex items-center justify-between">
                                    <div class="flex items-center gap-2.5">
                                        <div class="w-7 h-7 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 font-bold text-[10px] flex items-center justify-center uppercase shrink-0">${initials}</div>
                                        <div class="flex flex-col">
                                            <span class="text-xs font-bold text-slate-800 line-clamp-1 max-w-[100px]">${item.provider}</span>
                                            <span class="text-[9px] text-emerald-600 font-bold flex items-center gap-0.5"><i class="fa-solid fa-circle-check text-[8px]"></i> Verified</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2.5">
                                        <span class="text-sm font-extrabold text-slate-900">${item.price}</span>
                                        <button onclick="alert('Routing clean contact channel loop...')" class="px-3.5 py-1.5 bg-[#0f172a] hover:bg-slate-800 text-white text-[11px] font-bold rounded-lg shadow-2xs transition-all cursor-pointer">Connect</button>
                                    </div>
                                </div>
                            </div>`;
                    });
                });
        }

        function submitNewListing() {
            const provider = document.getElementById('form-provider').value;
            const category = document.getElementById('form-category').value;
            const type = document.getElementById('form-type').value;
            const title = document.getElementById('form-title').value;
            const description = document.getElementById('form-description').value;
            const price = document.getElementById('form-price').value;
            const isStudent = document.getElementById('form-student').checked;

            if(!provider || !title || !description) {
                alert('Fill out all fields before publishing.');
                return;
            }

            fetch('/api/listings/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ provider, category, type, title, description, price, is_student: isStudent ? 'true' : 'false' })
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    document.getElementById('form-title').value = '';
                    document.getElementById('form-description').value = '';
                    document.getElementById('form-price').value = '';
                    toggleModal(false);
                    fetchAndRenderListings();
                }
            });
        }
    </script>
</body>
</html>
