<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanad — Community Exchange Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #dfd5c6; /* Perfect neutral warm desert sand */
            background-image: 
                linear-gradient(rgba(13c, 90, 50, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13c, 90, 50, 0.04) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .hero-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .cyber-header {
            background: rgba(240, 232, 218, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(150, 110, 80, 0.2);
        }

        /* Custom Styling to fit Leaflet beautifully into the heritage look */
        .leaflet-container {
            font-family: 'Plus Jakarta Sans', sans-serif;
            border-radius: 24px;
        }

        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 35s linear infinite;
        }
    </style>
</head>
<body class="text-stone-900 antialiased min-h-screen flex flex-col p-4 md:p-6 gap-6">

    <header class="w-full max-w-7xl mx-auto h-20 cyber-header rounded-3xl px-6 flex items-center justify-between sticky top-4 z-50 shadow-xs">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-transparent rounded-xl flex items-center justify-center overflow-hidden shrink-0">
                <img src="/static/Logo.png" alt="Sanad Logo" class="object-contain h-full w-full">
            </div>
            <div class="flex flex-col">
                <span class="text-base font-black tracking-widest text-stone-950 leading-none">SANAD</span>
                <span class="text-[11px] text-[#a06a42] font-bold tracking-widest uppercase mt-0.5">سند</span>
            </div>
        </div>

        <div class="hidden md:flex items-center gap-2.5 text-[10px] font-black text-stone-700 tracking-widest uppercase bg-stone-900/5 px-4 py-2 rounded-xl border border-stone-900/5">
            <i class="fa-solid fa-location-crosshairs text-emerald-700 animate-pulse"></i>
            <span>YOUR HUB POSITION: <span id="user-coords" class="text-stone-950">24.4539° N, 54.3773° E</span></span>
        </div>

        <div>
            <button onclick="toggleModal(true)" class="bg-[#ac7347] hover:bg-[#945f37] text-white text-xs font-extrabold px-6 py-3 rounded-xl transition-all duration-200 transform active:scale-95 cursor-pointer tracking-wider shadow-sm">
                BROADCAST ASSET
            </button>
        </div>
    </header>

    <section class="w-full max-w-7xl mx-auto pt-4 pb-2 flex flex-col gap-1.5">
        <div class="w-12 h-1 bg-[#ac7347] rounded-full mb-1"></div>
        <h1 class="hero-font text-5xl md:text-6xl font-black text-stone-950 tracking-tighter leading-[0.95] uppercase select-none">
            COMMUNITY<br>
            <span class="bg-gradient-to-r from-[#8a5329] to-[#ac7347] bg-clip-text text-transparent">SUPPORT MAP GRID</span>
        </h1>
    </section>

    <section class="w-full max-w-7xl mx-auto">
        <div id="main-map" class="w-full h-80 md:h-96 rounded-3xl border border-stone-400/40 shadow-xs z-10"></div>
    </section>

    <section class="w-screen -mx-4 md:-mx-6 bg-[#d4c8b6] border-y border-stone-400/40 py-3 overflow-hidden flex select-none">
        <div class="flex whitespace-nowrap gap-12 text-[10px] font-black tracking-widest uppercase items-center animate-marquee shrink-0 text-stone-800">
            <span>SANAD RADIAL MAPPING PLATFORM ONLINE</span> <span class="text-[#ac7347]">•</span>
            <span class="font-bold opacity-60">CLICK CARDS TO LOCATE ASSETS ON MAP</span> <span class="text-[#ac7347]">•</span>
            <span class="text-stone-950">GPS TETHERING COMPLETED</span> <span class="text-[#ac7347]">•</span>
        </div>
    </section>

    <main class="w-full max-w-7xl mx-auto flex flex-col gap-6 mt-1 flex-1">
        
        <div class="w-full flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-stone-400/40 pb-4">
            <div class="flex items-center gap-2 overflow-x-auto whitespace-nowrap scrollbar-none">
                <button id="tab-all" onclick="filterCategory('all')" class="px-5 py-2.5 rounded-xl text-xs font-extrabold bg-[#ac7347] text-white transition-all cursor-pointer">ALL NODES</button>
                <button id="tab-services" onclick="filterCategory('services')" class="px-5 py-2.5 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer">FAMILY SERVICES</button>
                <button id="tab-heritage" onclick="filterCategory('heritage')" class="px-5 py-2.5 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer">HERITAGE & CRAFTS</button>
            </div>

            <div class="flex items-center bg-[#d4c8b6]/60 p-1 rounded-xl border border-stone-400/30 self-start sm:self-auto">
                <button id="type-all" onclick="filterType('all')" class="px-4 py-1.5 bg-[#c8bca8] text-stone-950 text-[10px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">ALL TYPES</button>
                <button id="type-service" onclick="filterType('Service')" class="px-4 py-1.5 text-stone-700 hover:text-stone-950 text-[10px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">OFFERS</button>
                <button id="type-product" onclick="filterType('Product')" class="px-4 py-1.5 text-stone-700 hover:text-stone-950 text-[10px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer">PRODUCTS</button>
            </div>
        </div>

        <div id="listings-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-[340px]">
            </div>
    </main>

    <div id="form-modal" class="fixed inset-0 bg-stone-950/40 backdrop-blur-xs z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-200">
        <div class="bg-[#ebdcc7] border border-stone-400/40 rounded-3xl shadow-xl w-full max-w-md p-5 transform scale-95 transition-all duration-200 text-stone-900 max-h-[90vh] overflow-y-auto">
            
            <div class="flex items-center justify-between border-b border-stone-400/40 pb-3 mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-3.5 bg-[#ac7347] rounded-xs"></div>
                    <h3 class="font-extrabold text-xs text-stone-950 uppercase tracking-widest">Register Exchange Node Location</h3>
                </div>
                <button onclick="toggleModal(false)" class="text-stone-600 hover:text-stone-950 cursor-pointer p-1">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Household / Identity Handle</label>
                    <input type="text" id="form-provider" placeholder="e.g. Al Suwaidi Family" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none focus:border-[#ac7347] text-stone-950">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Exchange Category</label>
                        <select id="form-category" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none focus:border-[#ac7347]">
                            <option value="services">Family Services</option>
                            <option value="heritage">Heritage & Crafts</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Asset Variant</label>
                        <select id="form-type" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none focus:border-[#ac7347]">
                            <option value="Service">Service</option>
                            <option value="Product">Product</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Exchange Listing Title</label>
                    <input type="text" id="form-title" placeholder="e.g. Arabic Calligraphy Tutoring" class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none focus:border-[#ac7347] text-stone-950">
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Operational Descriptions Context</label>
                    <textarea id="form-description" rows="2" placeholder="Provide details..." class="w-full text-xs px-3 py-2 bg-[#f6ede0] border border-stone-400/40 rounded-xl focus:outline-none focus:border-[#ac7347] text-stone-950 resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-[9px] font-black text-stone-700 uppercase tracking-widest mb-1">Tap/Click Map to Place Pin</label>
                    <div id="modal-map" class="w-full h-28 rounded-xl border border-stone-400/50 shadow-xs"></div>
                    <input type="hidden" id="form-lat" value="24.4539">
                    <input type="hidden" id="form-lng" value="54.3773">
                </div>

                <div class="flex items-center justify-between gap-3 border border-stone-400/40 p-2 rounded-xl bg-[#f6ede0]">
                    <div>
                        <label class="block text-[9px] font-black text-stone-500 tracking-widest uppercase mb-0.5">Value Rate Metric</label>
                        <input type="text" id="form-price" placeholder="AED 150" class="w-full bg-transparent text-xs text-stone-950 font-black focus:outline-none">
                    </div>
                    <div class="flex items-center gap-1.5 border-l border-stone-400/40 pl-3 h-8 shrink-0">
                        <input type="checkbox" id="form-student" class="w-3.5 h-3.5 accent-[#ac7347] rounded bg-white">
                        <label for="form-student" class="text-[9px] font-black text-stone-600 tracking-widest uppercase select-none cursor-pointer">Student?</label>
                    </div>
                </div>

                <button onclick="submitNewListing()" class="w-full bg-[#ac7347] hover:bg-[#945f37] text-white text-xs font-black uppercase tracking-widest py-3 rounded-xl transition-all cursor-pointer text-center shadow-xs">
                    BROADCAST MAP INTEGRATION
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentCategory = 'all';
        let currentType = 'all';
        
        // Base coordinate baseline references Abu Dhabi center (Corniche)
        const userLat = 24.4539;
        const userLng = 54.3773;

        let mainMap, modalMap;
        let mainMarkersGroup = L.layerGroup();
        let modalSelectionMarker = null;

        // Initialize maps on browser window settlement
        window.addEventListener('DOMContentLoaded', () => {
            initMaps();
            fetchAndRenderListings();
        });

        function initMaps() {
            // 1. Initialize Main App Display Map
            mainMap = L.map('main-map', { scrollWheelZoom: false }).setView([userLat, userLng], 12);
            
            // Warm tones/Sepia filtered clean terrain tile map
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
            }).addTo(mainMap);

            // Mark User Base Central Point
            L.marker([userLat, userLng]).addTo(mainMap)
                .bindPopup('<b style="font-family:sans-serif; font-size:11px; color:#ac7347;">YOUR MAIN CURRENT STATION HUB</b>')
                .openPopup();

            mainMarkersGroup.addTo(mainMap);

            // 2. Initialize Mini Creation Map Inside Form Overlay Modal
            modalMap = L.map('modal-map', { zoomControl: false }).setView([userLat, userLng], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(modalMap);

            // Setup click binding inside formulation map to track live coordinate changes
            modalMap.on('click', (e) => {
                const clickedLat = e.latlng.lat;
                const clickedLng = e.latlng.lng;
                
                document.getElementById('form-lat').value = clickedLat;
                document.getElementById('form-lng').value = clickedLng;

                if (modalSelectionMarker) {
                    modalSelectionMarker.setLatLng(e.latlng);
                } else {
                    modalSelectionMarker = L.marker(e.latlng).addTo(modalMap);
                }
            });
        }

        function toggleModal(open) {
            const modal = document.getElementById('form-modal');
            const inner = modal.querySelector('div');
            if(open) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                inner.classList.remove('scale-95');
                // Leaflet requires container tracking verification updates if initialized hidden
                setTimeout(() => { modalMap.invalidateSize(); }, 200);
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                inner.classList.add('scale-95');
            }
        }

        function panToMapTarget(lat, lng, label) {
            if(mainMap && lat && lng) {
                mainMap.setView([lat, lng], 14, { animate: true, duration: 1.5 });
                // Automatically find and invoke popup display
                mainMarkersGroup.eachLayer((marker) => {
                    if(marker.getLatLng().lat === parseFloat(lat) && marker.getLatLng().lng === parseFloat(lng)) {
                        marker.openPopup();
                    }
                });
                window.scrollTo({ top: document.getElementById('main-map').offsetTop - 100, behavior: 'smooth' });
            }
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.className = 'px-5 py-2.5 rounded-xl text-xs font-bold text-stone-700 hover:text-stone-950 transition-all cursor-pointer';
            });
            const targeted = document.getElementById(`tab-${cat}`);
            if(targeted) targeted.className = 'px-5 py-2.5 rounded-xl text-xs font-extrabold bg-[#ac7347] text-white transition-all cursor-pointer';
            fetchAndRenderListings();
        }

        function filterType(type) {
            currentType = type;
            document.querySelectorAll('[id^="type-"]').forEach(el => {
                el.className = 'px-4 py-1.5 text-stone-700 hover:text-stone-950 text-[10px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer';
            });
            const idMap = type === 'all' ? 'all' : type === 'Service' ? 'service' : 'product';
            const node = document.getElementById(`type-${idMap}`);
            if(node) node.className = 'px-4 py-1.5 bg-[#c8bca8] text-stone-950 text-[10px] font-black tracking-wider uppercase rounded-lg transition-all cursor-pointer';
            fetchAndRenderListings();
        }

        // Live Haversine Radial Distance Equation Helper
        function calculateKilometerGap(lat1, lon1, lat2, lon2) {
            if (!lat2 || !lon2) return null;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(1);
        }

        function fetchAndRenderListings() {
            fetch(`/api/listings?category=${currentCategory}&type=${currentType}`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('listings-grid');
                    container.innerHTML = '';
                    mainMarkersGroup.clearLayers(); // Clean existing markers
                    
                    if(data.length === 0) {
                        container.innerHTML = `
                            <div class="col-span-full bg-stone-400/20 border border-dashed border-stone-500 rounded-3xl p-16 text-center text-stone-700 text-xs font-bold uppercase tracking-widest">
                                Zero operational grid nodes discovered matching parameters.
                            </div>`;
                        return;
                    }

                    data.forEach((item) => {
                        const initials = item.provider ? item.provider.substring(0, 2).toUpperCase() : 'SD';
                        
                        // Parse geographical coordinates securely
                        let targetLat = item.latitude ? parseFloat(item.latitude) : 24.4322;
                        let targetLon = item.longitude ? parseFloat(item.longitude) : 54.6044;
                        
                        if(item.location_zone && item.location_zone.includes(',')) {
                            const splitted = item.location_zone.split(',');
                            targetLat = parseFloat(splitted[0]);
                            targetLon = parseFloat(splitted[1]);
                        }

                        // Inject dynamic pin data straight into Leaflet Main Engine Map Layers
                        const mapMarker = L.marker([targetLat, targetLon])
                            .bindPopup(`<div style="font-family:'Plus Jakarta Sans', sans-serif; p-1"><b style="color:#ac7347; text-transform:uppercase; font-size:12px;">${item.title}</b><br><span style="font-size:10px; color:#444;">Handler: ${item.provider}</span></div>`);
                        mainMarkersGroup.addLayer(mapMarker);

                        // Calculate spatial visual distance readout metrics
                        const computedDistance = calculateKilometerGap(userLat, userLng, targetLat, targetLon);
                        const distanceText = computedDistance ? `${computedDistance} km away` : 'Active Area';

                        // PERFECT UNIFORM SAME-LENGTH STRUCTURAL MATRIX Injections
                        const cardHtml = `
                            <div onclick="panToMapTarget(${targetLat}, ${targetLon}, '${item.title}')" class="bg-gradient-to-br from-[#f5ede0] to-[#ebdcc7] border border-stone-400/30 rounded-3xl p-6 flex flex-col justify-between transition-all duration-200 hover:-translate-y-1 hover:shadow-md text-stone-900 cursor-pointer group">
                                <div>
                                    <div class="flex justify-between items-center gap-2 mb-4">
                                        <span class="text-[9px] font-black uppercase tracking-widest bg-stone-950/5 text-stone-700 px-2.5 py-1 rounded-md border border-stone-400/20">${item.type}</span>
                                        <span class="text-[11px] text-[#ac7347] font-extrabold tracking-tight flex items-center gap-1">
                                            <i class="fa-solid fa-map-pin text-emerald-700 group-hover:scale-125 transition-transform"></i> ${distanceText}
                                        </span>
                                    </div>
                                    <h3 class="hero-font text-xl font-black tracking-tight leading-tight uppercase mb-2 text-stone-950 line-clamp-2">${item.title}</h3>
                                    <p class="text-xs text-stone-700 leading-relaxed font-medium line-clamp-4">${item.description}</p>
                                </div>
                                
                                <div class="border-t border-stone-400/30 pt-4 flex items-center justify-between">
                                    <div class="flex items-center gap-2.5">
                                        <div class="w-8 h-8 rounded-xl bg-[#ac7347]/10 text-[#ac7347] font-black text-xs flex items-center justify-center uppercase">${initials}</div>
                                        <div class="flex flex-col">
                                            <span class="text-xs font-bold tracking-tight text-stone-950 leading-none">${item.provider}</span>
                                            <span class="text-[9px] text-stone-500 font-bold tracking-wider mt-0.5 uppercase">MEMBER NODE</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="text-base font-black text-stone-950 tracking-tight">${item.price}</span>
                                        <button class="px-4 py-2 bg-stone-950 text-white group-hover:bg-[#ac7347] text-[9px] font-black uppercase tracking-widest rounded-xl transition-all">LOCATE</button>
                                    </div>
                                </div>
                            </div>`;
                        
                        container.innerHTML += cardHtml;
                    });
                });
        }

        function submitNewListing() {
            const provider = document.getElementById('form-provider').value;
            const category = document.getElementById('form-category').value;
            const type = document.getElementById('form-type').value;
            const title = document.getElementById('form-title').value;
            const description = document.getElementById('form-description').value;
            const price = document.getElementById('form-price').value;
            const chosenLat = document.getElementById('form-lat').value;
            const chosenLng = document.getElementById('form-lng').value;
            const isStudent = document.getElementById('form-student').checked;

            if(!provider || !title || !description) {
                alert('Fill out all parameter fields to complete registration.');
                return;
            }

            fetch('/api/listings/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    provider, category, type, title, description, price, 
                    location_zone: `${chosenLat},${chosenLng}`,
                    is_student: isStudent ? 'true' : 'false' 
                })
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    document.getElementById('form-title').value = '';
                    document.getElementById('form-description').value = '';
                    document.getElementById('form-price').value = '';
                    if(modalSelectionMarker) { modalMap.removeLayer(modalSelectionMarker); modalSelectionMarker = null; }
                    toggleModal(false);
                    fetchAndRenderListings();
                }
            });
        }
    </script>
</body>
</html>
